services:  
  frontend:  
    build:  
      context: .  
      dockerfile: Dockerfile  
      args:  
        VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8081/api}  
        VITE_WS_URL: ${VITE_WS_URL:-ws://127.0.0.1:8081/ws}  
        VITE_MOCK_AUTH: ${VITE_MOCK_AUTH:-false}  
    ports:  
      - "8080:80"  
    restart: unless-stopped